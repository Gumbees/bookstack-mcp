name: Build Development

# Build images on every push to `development`. PR squash-merges arrive
# as push events and take the same path. There is no PR-time image build
# and no retag-on-merge step (see issue #96).
#
# `workflow_dispatch` stays as a manual rebuild escape hatch.
#
# Canonical references:
#   https://kb.beesroadhouse.com/books/developer-operations-devops/page/branching-strategy             (1860)
#   https://kb.beesroadhouse.com/books/developer-operations-devops/page/docker-image-build-workflows   (1905)

on:
  push:
    branches: [development]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you dispatching this manually? (audit trail only)"
        required: false
        default: "manual rebuild"

env:
  REGISTRY: ghcr.io
  REPO_URL: https://github.com/bees-roadhouse/bookstack-mcp

concurrency:
  group: build-development-${{ github.ref }}
  cancel-in-progress: false

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + sha
        id: vars
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          SHORT_SHA=${GITHUB_SHA:0:7}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  build:
    needs: [vars]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bsmcp-server
            dockerfile: docker/Dockerfile.server
            scope: server
          - image: bsmcp-embedder
            dockerfile: docker/Dockerfile.embedder
            scope: embedder
          - image: bsmcp-worker
            dockerfile: docker/Dockerfile.worker
            scope: worker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}:dev
            ${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}:dev-${{ needs.vars.outputs.short_sha }}
            ${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}:${{ needs.vars.outputs.version }}-dev
            ${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}:${{ needs.vars.outputs.version }}-dev-${{ needs.vars.outputs.short_sha }}
          labels: |
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}
