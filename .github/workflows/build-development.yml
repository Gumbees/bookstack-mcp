name: Build Development Images

# Fires on every push to development (PR squash-merge OR direct push).
# Builds multi-arch images and pushes :dev / :dev-{sha} / :{version}-dev /
# :{version}-dev-{sha} tags so deployments tracking :dev or
# :{version}-dev pick up the new build automatically.
#
# Modeled on dtc-inc/client-portal's build-development.yml. CI builds the
# images directly — no contributor-uploads step.

on:
  push:
    branches: [development]
  # Manual trigger for the case where a push event drops (GitHub Actions
  # occasionally fails to fire workflow runs for squash-merge commits).
  # `gh workflow run "Build Development Images" --ref development`.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: docker/Dockerfile.server
            image: bsmcp-server
          - name: embedder
            dockerfile: docker/Dockerfile.embedder
            image: bsmcp-embedder
          - name: worker
            dockerfile: docker/Dockerfile.worker
            image: bsmcp-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: docker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=dev
            type=raw,value=dev-${{ steps.meta.outputs.short_sha }}
            type=raw,value=${{ steps.meta.outputs.version }}-dev
            type=raw,value=${{ steps.meta.outputs.version }}-dev-${{ steps.meta.outputs.short_sha }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.docker.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
