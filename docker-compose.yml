services:
  bookstack-mcp:
    build: .
    container_name: bookstack-mcp
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      BSMCP_BOOKSTACK_URL: ${BSMCP_BOOKSTACK_URL:-https://docs.beesroadhouse.com}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookstack-mcp.rule=Host(`bookstack-mcp.beesroadhouse.com`)"
      - "traefik.http.routers.bookstack-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.bookstack-mcp.loadbalancer.server.port=8080"
    networks:
      - traefik

networks:
  traefik:
    external: true
