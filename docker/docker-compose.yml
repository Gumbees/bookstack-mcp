services:
  bsmcp-postgres:
    image: pgvector/pgvector:pg17
    volumes:
      - bsmcp-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bsmcp
      POSTGRES_USER: bsmcp
      POSTGRES_PASSWORD: ${BSMCP_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bsmcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  bsmcp-server:
    image: ghcr.io/gumbees/bsmcp-server:0.5.6
    environment:
      BSMCP_DB_BACKEND: postgres
      BSMCP_DATABASE_URL: postgres://bsmcp:${BSMCP_DB_PASSWORD}@bsmcp-postgres/bsmcp
      BSMCP_BOOKSTACK_URL: ${BSMCP_BOOKSTACK_URL}
      BSMCP_ENCRYPTION_KEY: ${BSMCP_ENCRYPTION_KEY}
      BSMCP_PUBLIC_DOMAIN: ${BSMCP_PUBLIC_DOMAIN}
      BSMCP_INTERNAL_DOMAIN: ${BSMCP_INTERNAL_DOMAIN:-}
      BSMCP_HOST: ${BSMCP_HOST:-0.0.0.0}
      BSMCP_PORT: ${BSMCP_PORT:-8080}
      BSMCP_INSTANCE_NAME: ${BSMCP_INSTANCE_NAME:-}
      BSMCP_INSTANCE_DESC: ${BSMCP_INSTANCE_DESC:-}
      BSMCP_SEMANTIC_SEARCH: ${BSMCP_SEMANTIC_SEARCH:-true}
      BSMCP_EMBEDDER_URL: ${BSMCP_EMBEDDER_URL:-http://bsmcp-embedder:8081}
      BSMCP_WEBHOOK_SECRET: ${BSMCP_WEBHOOK_SECRET}
      BSMCP_ACCESS_TOKEN_TTL: ${BSMCP_ACCESS_TOKEN_TTL:-2592000}
      BSMCP_REFRESH_TOKEN_TTL: ${BSMCP_REFRESH_TOKEN_TTL:-7776000}
      BSMCP_LLM_PROVIDER: ${BSMCP_LLM_PROVIDER:-}
      BSMCP_LLM_API_KEY: ${BSMCP_LLM_API_KEY:-}
      BSMCP_LLM_MODEL: ${BSMCP_LLM_MODEL:-}
      BSMCP_LLM_API_URL: ${BSMCP_LLM_API_URL:-}
      BSMCP_SUMMARY_INTERVAL: ${BSMCP_SUMMARY_INTERVAL:-0}
      BSMCP_SUMMARY_TOKEN_ID: ${BSMCP_SUMMARY_TOKEN_ID:-}
      BSMCP_SUMMARY_TOKEN_SECRET: ${BSMCP_SUMMARY_TOKEN_SECRET:-}
      BSMCP_BACKUP_INTERVAL: ${BSMCP_BACKUP_INTERVAL:-}
      BSMCP_BACKUP_PATH: ${BSMCP_BACKUP_PATH:-/data/backups}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    ports:
      - "${BSMCP_PORT:-8080}:${BSMCP_PORT:-8080}"
    depends_on:
      bsmcp-postgres:
        condition: service_healthy

  bsmcp-embedder:
    image: ghcr.io/gumbees/bsmcp-embedder:0.5.6
    cpus: ${BSMCP_EMBED_CPUS:-0}
    volumes:
      - bsmcp-models:/data/models
    environment:
      BSMCP_DB_BACKEND: postgres
      BSMCP_DATABASE_URL: postgres://bsmcp:${BSMCP_DB_PASSWORD}@bsmcp-postgres/bsmcp
      BSMCP_ENCRYPTION_KEY: ${BSMCP_ENCRYPTION_KEY}
      BSMCP_BOOKSTACK_URL: ${BSMCP_BOOKSTACK_URL}
      BSMCP_EMBED_TOKEN_ID: ${BSMCP_EMBED_TOKEN_ID}
      BSMCP_EMBED_TOKEN_SECRET: ${BSMCP_EMBED_TOKEN_SECRET}
      BSMCP_MODEL_PATH: /data/models
      BSMCP_EMBED_PROVIDER: ${BSMCP_EMBED_PROVIDER:-local}
      BSMCP_EMBED_MODEL: ${BSMCP_EMBED_MODEL:-BAAI/bge-base-en-v1.5}
      BSMCP_EMBED_API_KEY: ${BSMCP_EMBED_API_KEY:-}
      BSMCP_EMBED_API_URL: ${BSMCP_EMBED_API_URL:-}
      BSMCP_EMBED_DIMS: ${BSMCP_EMBED_DIMS:-}
      BSMCP_EMBED_BATCH_SIZE: ${BSMCP_EMBED_BATCH_SIZE:-32}
      BSMCP_EMBED_DELAY_MS: ${BSMCP_EMBED_DELAY_MS:-50}
      BSMCP_EMBED_ON_STARTUP: ${BSMCP_EMBED_ON_STARTUP:-false}
      BSMCP_EMBED_POLL_INTERVAL: ${BSMCP_EMBED_POLL_INTERVAL:-5}
      BSMCP_EMBED_JOB_TIMEOUT: ${BSMCP_EMBED_JOB_TIMEOUT:-14400}
      BSMCP_EMBED_FAILURE_THRESHOLD: ${BSMCP_EMBED_FAILURE_THRESHOLD:-10}
      BSMCP_EMBED_CONSECUTIVE_ABORT: ${BSMCP_EMBED_CONSECUTIVE_ABORT:-10}
      BSMCP_EMBED_HOST: ${BSMCP_EMBED_HOST:-0.0.0.0}
      BSMCP_EMBED_PORT: ${BSMCP_EMBED_PORT:-8081}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    depends_on:
      bsmcp-postgres:
        condition: service_healthy

volumes:
  bsmcp-pgdata:
  bsmcp-models:
