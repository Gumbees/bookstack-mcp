services:
  bookstack-mcp:
    image: ghcr.io/gumbees/bookstack-mcp:latest
    container_name: bookstack-mcp
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - bsmcp-data:/data
    environment:
      # Required
      BSMCP_BOOKSTACK_URL: ${BSMCP_BOOKSTACK_URL}
      BSMCP_ENCRYPTION_KEY: ${BSMCP_ENCRYPTION_KEY}
      BSMCP_PUBLIC_DOMAIN: ${BSMCP_PUBLIC_DOMAIN}
      # Optional
      BSMCP_INTERNAL_DOMAIN: ${BSMCP_INTERNAL_DOMAIN:-bookstack-mcp}
      # BSMCP_INSTANCE_NAME: ${BSMCP_INSTANCE_NAME:-}
      # BSMCP_INSTANCE_DESC: ${BSMCP_INSTANCE_DESC:-}
      # BSMCP_BACKUP_INTERVAL: ${BSMCP_BACKUP_INTERVAL:-}
      # BSMCP_BACKUP_PATH: ${BSMCP_BACKUP_PATH:-/data/backups}
      # Semantic search (optional)
      # BSMCP_SEMANTIC_SEARCH: ${BSMCP_SEMANTIC_SEARCH:-false}
      # BSMCP_MODEL_PATH: /data/models
      # BSMCP_WEBHOOK_SECRET: ${BSMCP_WEBHOOK_SECRET:-}
      # BSMCP_EMBED_TOKEN_ID: ${BSMCP_EMBED_TOKEN_ID:-}
      # BSMCP_EMBED_TOKEN_SECRET: ${BSMCP_EMBED_TOKEN_SECRET:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookstack-mcp.rule=Host(`${BSMCP_PUBLIC_DOMAIN}`)"
      - "traefik.http.routers.bookstack-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.bookstack-mcp.loadbalancer.server.port=8080"
    networks:
      - traefik

volumes:
  bsmcp-data:

networks:
  traefik:
    external: true
