name: Build Working Branch Images

# Fires on push to any work branch (feature/, improvement/, refactor/, bug/).
# Produces multi-arch pull-and-test images tagged
# `{version}-{branch-slug}` (movable, latest of that branch) and
# `{version}-{branch-slug}-{short-sha}` (immutable, for pinning a specific
# commit in a Portainer stack).
#
# Modeled on dtc-inc/client-portal's three-workflow split. CI builds the
# images directly — no contributor-uploads step. Multi-arch via QEMU.

on:
  push:
    branches:
      - 'feature/**'
      - 'improvement/**'
      - 'refactor/**'
      - 'bug/**'

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: server
            dockerfile: docker/Dockerfile.server
            image: bsmcp-server
          - name: embedder
            dockerfile: docker/Dockerfile.embedder
            image: bsmcp-embedder
          - name: worker
            dockerfile: docker/Dockerfile.worker
            image: bsmcp-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version + slug
        id: meta
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          SHORT_SHA=${GITHUB_SHA::7}
          # Flatten slashes; sanitize anything else to dashes.
          SLUG=$(printf '%s' "${GITHUB_REF#refs/heads/}" | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: docker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.slug }}
            type=raw,value=${{ steps.meta.outputs.version }}-${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.short_sha }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.docker.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
