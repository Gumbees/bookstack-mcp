name: Build and Release

on:
  push:
    branches:
      - development
      - release
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/bees-roadhouse/bsmcp-server
          tags: |
            # dev + versioned dev tag from development branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=${{ steps.version.outputs.version }}-dev.${{ github.sha }},enable=${{ github.ref == 'refs/heads/development' }}
            # latest + release from release branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/release' }}
            type=raw,value=release,enable=${{ github.ref == 'refs/heads/release' }}
            # semver tags from v* tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

  embedder:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: echo "version=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/bees-roadhouse/bsmcp-embedder
          tags: |
            # dev + versioned dev tag from development branch
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/development' }}
            type=raw,value=${{ steps.version.outputs.version }}-dev.${{ github.sha }},enable=${{ github.ref == 'refs/heads/development' }}
            # latest + release from release branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/release' }}
            type=raw,value=release,enable=${{ github.ref == 'refs/heads/release' }}
            # semver tags from v* tags
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push embedder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.embedder
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=embedder
          cache-to: type=gha,mode=max,scope=embedder
