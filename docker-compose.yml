services:
  bookstack-mcp:
    image: ghcr.io/gumbees/bookstack-mcp:latest
    container_name: bookstack-mcp
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - mcp-data:/data
    environment:
      BSMCP_BOOKSTACK_URL: ${BSMCP_BOOKSTACK_URL:-https://docs.beesroadhouse.com}
      BSMCP_INSTANCE_NAME: ${BSMCP_INSTANCE_NAME:-}
      BSMCP_INSTANCE_DESC: ${BSMCP_INSTANCE_DESC:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bookstack-mcp.rule=Host(`bookstack-mcp.beesroadhouse.com`)"
      - "traefik.http.routers.bookstack-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.services.bookstack-mcp.loadbalancer.server.port=8080"
    networks:
      - traefik

volumes:
  mcp-data:

networks:
  traefik:
    external: true
