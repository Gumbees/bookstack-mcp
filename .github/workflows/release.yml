name: Build and Release

# Contributor-uploads-image model:
#
#   1. Before pushing a PR commit, the contributor runs scripts/publish-pr-image.sh
#      to build & push multi-arch images to GHCR with the per-PR tags
#      `{version}-{slug}-{sha}` and `{version}-{slug}`. CI does NOT build images
#      on PR commits — that's the contributor's job and shifts ~15 min of CI
#      minutes off every push.
#
#   2. PR opened/updated against development or release  ->  `build-*` jobs
#      run lightweight verification: confirm the image manifest exists at the
#      expected per-PR tag and is multi-arch (linux/amd64 + linux/arm64).
#      The PR cannot merge until both verify checks pass (enforced via branch
#      protection: required status checks "build-server" and "build-embedder").
#      Job names preserved so existing branch protection rulesets keep working.
#
#   3. PR merged                                         ->  `promote` job
#      retags the contributor's per-PR image as the appropriate stream tag
#      (`dev`/`{version}-dev` for development merges; `{version}`/`release`/
#      `latest` for release merges). No rebuild — the merge commit shares
#      the source tree of the PR head.
#
#   4. PR merged into release                            ->  `github-release-on-merge`
#      creates a GitHub Release entry, then `release-binaries-on-merge` builds
#      `bsmcp-server` native binaries for 5 targets and attaches them to the
#      Release. The embedder is NOT released as a bare binary (ONNX Runtime
#      native dep) — Docker is the only supported distribution for it.
#
#   5. v* tag push (emergency hotfix path)               ->  `tag-release`
#      builds & pushes semver-tagged images directly in CI, creates the
#      Release, and attaches the server binaries. Use only when the
#      contributor cannot push images themselves.
#
#   6. Direct push to development or release              ->  `push-build`
#      Full multi-arch build in CI + push to the stream's rolling and
#      immutable per-commit tags. The canonical Branching Strategy
#      authorizes direct pushes for small/scaffolding/hotfix changes;
#      this job ensures the dev/release-stream images don't lag behind
#      the branch when a contributor bypasses the PR flow.
#
# Tag map (after PR merge to development):
#   :dev                              rolling, latest dev
#   :dev-{merge_sha}                  immutable per-merge
#   :{version}-dev                    versioned dev rolling
#   :{version}-dev-{merge_sha}        versioned dev immutable per-merge
#
# Tag map (after PR merge to release):
#   :{version}                        immutable semver
#   :{version}-{merge_sha}            immutable per-merge
#   :release, :latest                 rolling release pointers
#
# Tag map (after direct push to development):
#   :dev, :dev-{sha}, :{version}-dev, :{version}-dev-{sha}
#
# Tag map (after direct push to release):
#   :{version}, :{version}-{sha}, :release, :latest

on:
  pull_request:
    branches: [development, release]
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [development, release]
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build-server:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve expected tag
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          SHORT_SHA=${HEAD_SHA:0:7}
          SLUG=$(printf '%s' "${{ github.event.pull_request.head.ref }}" | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-')
          echo "tag=${VERSION}-${SLUG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/bees-roadhouse/bsmcp-server" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists and is multi-arch
        run: |
          REF="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}"
          echo "Inspecting $REF"
          if ! docker buildx imagetools inspect --raw "$REF" > manifest.json 2>/tmp/err; then
            echo "::error::Image not found at $REF"
            echo "::error::Run scripts/publish-pr-image.sh on your branch to build and push it. See DEVELOPMENT.md."
            cat /tmp/err
            exit 1
          fi
          # Manifest list must include both linux/amd64 and linux/arm64.
          ARCHES=$(jq -r '.manifests[]?.platform | "\(.os)/\(.architecture)"' manifest.json | sort -u | tr '\n' ' ')
          echo "Found arches: $ARCHES"
          for want in linux/amd64 linux/arm64; do
            if ! echo " $ARCHES " | grep -q " $want "; then
              echo "::error::Image is missing platform $want — manifest had: $ARCHES"
              exit 1
            fi
          done
          echo "OK: $REF is multi-arch (linux/amd64 + linux/arm64)"

  build-embedder:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Resolve expected tag
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          SHORT_SHA=${HEAD_SHA:0:7}
          SLUG=$(printf '%s' "${{ github.event.pull_request.head.ref }}" | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-')
          echo "tag=${VERSION}-${SLUG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/bees-roadhouse/bsmcp-embedder" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists and is multi-arch
        run: |
          REF="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}"
          echo "Inspecting $REF"
          if ! docker buildx imagetools inspect --raw "$REF" > manifest.json 2>/tmp/err; then
            echo "::error::Image not found at $REF"
            echo "::error::Run scripts/publish-pr-image.sh on your branch to build and push it. See DEVELOPMENT.md."
            cat /tmp/err
            exit 1
          fi
          ARCHES=$(jq -r '.manifests[]?.platform | "\(.os)/\(.architecture)"' manifest.json | sort -u | tr '\n' ' ')
          echo "Found arches: $ARCHES"
          for want in linux/amd64 linux/arm64; do
            if ! echo " $ARCHES " | grep -q " $want "; then
              echo "::error::Image is missing platform $want — manifest had: $ARCHES"
              exit 1
            fi
          done
          echo "OK: $REF is multi-arch (linux/amd64 + linux/arm64)"

  # --- Direct-push fallback ---
  #
  # Direct pushes to `development` or `release` (authorized by the canonical
  # Branching Strategy for small/scaffolding/hotfix changes) bypass the
  # contributor-uploads-image flow. This job runs a full multi-arch build in
  # CI and tags the resulting image with the appropriate stream tags so the
  # rolling `:dev` / `:release` / `:latest` tags don't lag behind the branch.
  #
  # PR-merge flow still uses the cheaper `promote` retag path (no rebuild).
  # CI cost is paid only when someone direct-pushes — incentive structure
  # stays right (PRs are cheap, direct push is correct but slow).
  push-build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/development' || github.ref == 'refs/heads/release')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bsmcp-server
            dockerfile: docker/Dockerfile.server
            scope: server
          - image: bsmcp-embedder
            dockerfile: docker/Dockerfile.embedder
            scope: embedder
    steps:
      - uses: actions/checkout@v4

      - name: Resolve stream + tags
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          SHORT_SHA=${GITHUB_SHA:0:7}
          IMG="${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}"
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            TAGS="$IMG:dev,$IMG:dev-${SHORT_SHA},$IMG:${VERSION}-dev,$IMG:${VERSION}-dev-${SHORT_SHA}"
          else
            TAGS="$IMG:${VERSION},$IMG:${VERSION}-${SHORT_SHA},$IMG:release,$IMG:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/bees-roadhouse/bookstack-mcp
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

  promote:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + branch slug
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          SLUG=$(printf '%s' "${{ github.event.pull_request.head.ref }}" | tr '/' '-' | tr -c 'a-zA-Z0-9._-' '-')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          echo "base_ref=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag for development merges
        if: steps.vars.outputs.base_ref == 'development'
        run: |
          # github.sha here is the merge commit's SHA on development —
          # different from the PR head SHA. We tag with this so the
          # immutable :dev-{sha} tag pins the merge result, not the PR
          # head, matching `git log` on development.
          MERGE_SHORT_SHA=${GITHUB_SHA:0:7}
          for IMAGE in bsmcp-server bsmcp-embedder; do
            SRC="${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.slug }}"
            docker buildx imagetools create \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:dev" \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:dev-${MERGE_SHORT_SHA}" \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:${{ steps.vars.outputs.version }}-dev" \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:${{ steps.vars.outputs.version }}-dev-${MERGE_SHORT_SHA}" \
              "$SRC"
          done

      - name: Retag for release merges
        if: steps.vars.outputs.base_ref == 'release'
        run: |
          MERGE_SHORT_SHA=${GITHUB_SHA:0:7}
          for IMAGE in bsmcp-server bsmcp-embedder; do
            SRC="${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:${{ steps.vars.outputs.version }}-${{ steps.vars.outputs.slug }}"
            docker buildx imagetools create \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:${{ steps.vars.outputs.version }}" \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:${{ steps.vars.outputs.version }}-${MERGE_SHORT_SHA}" \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:release" \
              --tag "${{ env.REGISTRY }}/bees-roadhouse/${IMAGE}:latest" \
              "$SRC"
          done

  github-release-on-merge:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'release'
    needs: [promote]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version + tag
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            NEEDS_TAG=false
          else
            NEEDS_TAG=true
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "needs_tag=${NEEDS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.vars.outputs.needs_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "Release ${{ steps.vars.outputs.tag }}"
          git push origin "${{ steps.vars.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: bookstack-mcp ${{ steps.vars.outputs.tag }}
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Container images

            ```
            docker pull ghcr.io/bees-roadhouse/bsmcp-server:${{ steps.vars.outputs.version }}
            docker pull ghcr.io/bees-roadhouse/bsmcp-embedder:${{ steps.vars.outputs.version }}
            ```

            Or pin to the rolling release tag:

            ```
            docker pull ghcr.io/bees-roadhouse/bsmcp-server:release
            docker pull ghcr.io/bees-roadhouse/bsmcp-embedder:release
            ```

            ## Native binaries (`bsmcp-server` only)

            Server binaries for common platforms are attached below. The embedder is not released as a bare binary because of its ONNX Runtime dependency — use the container image instead.

  release-binaries-on-merge:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'release'
    needs: [github-release-on-merge]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation linker (Linux aarch64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build server binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p bsmcp-server

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE=bsmcp-server-${{ needs.github-release-on-merge.outputs.tag }}-${{ matrix.target }}
          mkdir "$STAGE"
          cp target/${{ matrix.target }}/release/bsmcp-server "$STAGE/"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          tar czf "$STAGE.tar.gz" "$STAGE"
          echo "ARCHIVE=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "bsmcp-server-${{ needs.github-release-on-merge.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bsmcp-server.exe" "$stage/"
          if (Test-Path README.md) { Copy-Item README.md "$stage/" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "$stage/" }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ARCHIVE=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attach archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.github-release-on-merge.outputs.tag }}
          files: ${{ env.ARCHIVE }}

  tag-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - image: bsmcp-server
            dockerfile: docker/Dockerfile.server
            scope: server
          - image: bsmcp-embedder
            dockerfile: docker/Dockerfile.embedder
            scope: embedder
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag $TAG_VERSION does not match Cargo.toml version $VERSION"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

  github-release-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [tag-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: bookstack-mcp ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Container images

            ```
            docker pull ghcr.io/bees-roadhouse/bsmcp-server:${{ steps.vars.outputs.version }}
            docker pull ghcr.io/bees-roadhouse/bsmcp-embedder:${{ steps.vars.outputs.version }}
            ```

            ## Native binaries (`bsmcp-server` only)

            Server binaries for common platforms are attached below. The embedder is not released as a bare binary because of its ONNX Runtime dependency — use the container image instead.

  release-binaries-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [github-release-on-tag]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation linker (Linux aarch64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build server binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p bsmcp-server

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE=bsmcp-server-${{ github.ref_name }}-${{ matrix.target }}
          mkdir "$STAGE"
          cp target/${{ matrix.target }}/release/bsmcp-server "$STAGE/"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          tar czf "$STAGE.tar.gz" "$STAGE"
          echo "ARCHIVE=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "bsmcp-server-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bsmcp-server.exe" "$stage/"
          if (Test-Path README.md) { Copy-Item README.md "$stage/" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "$stage/" }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ARCHIVE=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attach archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ARCHIVE }}
