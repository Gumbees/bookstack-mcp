name: Release

# Release-stream concerns. Triggers:
#
#   1. push: release          → after promote-on-merge.yml has retagged
#                               the version tags, this workflow creates
#                               the GitHub Release entry and attaches
#                               native bsmcp-server binaries for 5
#                               targets. No image rebuild — the version
#                               tags already point at the right manifest.
#
#   2. push: tag v*           → emergency hotfix path. Builds and pushes
#                               semver-tagged images directly, then
#                               creates the matching GitHub Release.
#                               Use only when the normal release flow
#                               (PR development → release, then merge)
#                               isn't available — typically because a
#                               regression on `release` needs a bypass.
#
#   3. workflow_dispatch       → manual recovery path.
#
# build-pr.yml is the gating workflow for PRs. promote-on-merge.yml
# moves the rolling tags. This workflow only handles the release stream.
#
# Canonical references:
#   https://kb.beesroadhouse.com/books/developer-operations-devops/page/github-actions-workflow-template (1897)
#   https://kb.beesroadhouse.com/books/developer-operations-devops/page/branching-strategy             (1860)

on:
  push:
    branches: [release]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # GitHub Release on push: release. Runs after promote-on-merge.yml
  # has already retagged the version tags. Creates the v{version} git
  # tag (if missing) and the GitHub Release entry; release-binaries-on-
  # merge attaches native binaries.
  github-release-on-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version + tag
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            NEEDS_TAG=false
          else
            NEEDS_TAG=true
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "needs_tag=${NEEDS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.vars.outputs.needs_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.vars.outputs.tag }}" -m "Release ${{ steps.vars.outputs.tag }}"
          git push origin "${{ steps.vars.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: bookstack-mcp ${{ steps.vars.outputs.tag }}
          tag_name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Container images

            ```
            docker pull ghcr.io/bees-roadhouse/bsmcp-server:${{ steps.vars.outputs.version }}
            docker pull ghcr.io/bees-roadhouse/bsmcp-embedder:${{ steps.vars.outputs.version }}
            docker pull ghcr.io/bees-roadhouse/bsmcp-worker:${{ steps.vars.outputs.version }}
            ```

            Or pin to the rolling release tag:

            ```
            docker pull ghcr.io/bees-roadhouse/bsmcp-server:release
            docker pull ghcr.io/bees-roadhouse/bsmcp-embedder:release
            docker pull ghcr.io/bees-roadhouse/bsmcp-worker:release
            ```

            ## Native binaries (`bsmcp-server` only)

            Server binaries for common platforms are attached below. The embedder is not released as a bare binary because of its ONNX Runtime dependency — use the container image instead.

  release-binaries-on-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    needs: [github-release-on-merge]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation linker (Linux aarch64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build server binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p bsmcp-server

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE=bsmcp-server-${{ needs.github-release-on-merge.outputs.tag }}-${{ matrix.target }}
          mkdir "$STAGE"
          cp target/${{ matrix.target }}/release/bsmcp-server "$STAGE/"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          tar czf "$STAGE.tar.gz" "$STAGE"
          echo "ARCHIVE=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "bsmcp-server-${{ needs.github-release-on-merge.outputs.tag }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bsmcp-server.exe" "$stage/"
          if (Test-Path README.md) { Copy-Item README.md "$stage/" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "$stage/" }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ARCHIVE=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attach archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.github-release-on-merge.outputs.tag }}
          files: ${{ env.ARCHIVE }}

  # Emergency hotfix path: a `v*` tag was pushed directly. Build the
  # semver-tagged images and create the GitHub Release. This is the
  # only path in this workflow that builds images.
  tag-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: bsmcp-server
            dockerfile: docker/Dockerfile.server
            scope: server
          - image: bsmcp-embedder
            dockerfile: docker/Dockerfile.embedder
            scope: embedder
          - image: bsmcp-worker
            dockerfile: docker/Dockerfile.worker
            scope: worker
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest version
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" != "$VERSION" ]]; then
            echo "::error::Tag $TAG_VERSION does not match Cargo.toml version $VERSION"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/bees-roadhouse/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push tagged image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.scope }}

  github-release-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [tag-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: vars
        run: |
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*= *"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: bookstack-mcp ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Container images

            ```
            docker pull ghcr.io/bees-roadhouse/bsmcp-server:${{ steps.vars.outputs.version }}
            docker pull ghcr.io/bees-roadhouse/bsmcp-embedder:${{ steps.vars.outputs.version }}
            docker pull ghcr.io/bees-roadhouse/bsmcp-worker:${{ steps.vars.outputs.version }}
            ```

            ## Native binaries (`bsmcp-server` only)

            Server binaries for common platforms are attached below. The embedder is not released as a bare binary because of its ONNX Runtime dependency — use the container image instead.

  release-binaries-on-tag:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [github-release-on-tag]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive: zip
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation linker (Linux aarch64 only)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          cat >> .cargo/config.toml <<EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build server binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p bsmcp-server

      - name: Package archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGE=bsmcp-server-${{ github.ref_name }}-${{ matrix.target }}
          mkdir "$STAGE"
          cp target/${{ matrix.target }}/release/bsmcp-server "$STAGE/"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          tar czf "$STAGE.tar.gz" "$STAGE"
          echo "ARCHIVE=$STAGE.tar.gz" >> "$GITHUB_ENV"

      - name: Package archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $stage = "bsmcp-server-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/bsmcp-server.exe" "$stage/"
          if (Test-Path README.md) { Copy-Item README.md "$stage/" }
          if (Test-Path LICENSE) { Copy-Item LICENSE "$stage/" }
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          "ARCHIVE=$stage.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Attach archive to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.ARCHIVE }}
